services:
  - type: web
    name: foresight-backend
    runtime: python
    plan: free
    buildCommand: python3.11 -m pip install --upgrade pip && python3.11 -m pip install -r requirements-render.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.14
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FORESIGHT_REQUIRE_SUPABASE
        value: "true"
      - key: FORESIGHT_LOAD_ARTIFACT_ENGINE
        value: "false"
      - key: FORESIGHT_MARKET_DATA_PROVIDER
        value: yfinance
      - key: FORESIGHT_MARKET_INDEX_AUTO_REFRESH
        value: "false"
      - key: FORESIGHT_MARKET_INDEX_REFRESH_LOOKBACK_DAYS
        value: "10"
