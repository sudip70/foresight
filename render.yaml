services:
  - type: web
    name: foresight-backend
    runtime: python
    plan: free
    buildCommand: python3.11 -m pip install --upgrade pip && python3.11 -m pip install -r requirements-render.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.14
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FORESIGHT_REQUIRE_SUPABASE
        value: "true"
      - key: FORESIGHT_LOAD_ARTIFACT_ENGINE
        value: "false"
      - key: FORESIGHT_MARKET_DATA_PROVIDER
        value: yfinance
      - key: FORESIGHT_MARKET_INDEX_AUTO_REFRESH
        value: "false"
      - key: FORESIGHT_MARKET_INDEX_REFRESH_LOOKBACK_DAYS
        value: "10"

  - type: cron
    name: foresight-daily-market-refresh
    runtime: python
    plan: starter
    schedule: "30 23 * * *"
    buildCommand: python3.11 -m pip install --upgrade pip && python3.11 -m pip install -r requirements-refresh.txt
    startCommand: scripts/refresh_supabase_daily.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.14
      - key: SUPABASE_URL
        fromService:
          type: web
          name: foresight-backend
          envVarKey: SUPABASE_URL
      - key: SUPABASE_SERVICE_ROLE_KEY
        fromService:
          type: web
          name: foresight-backend
          envVarKey: SUPABASE_SERVICE_ROLE_KEY
      - key: FORESIGHT_MARKET_DATA_PROVIDER
        value: yfinance
      - key: FORESIGHT_REFRESH_MODE
        value: incremental
      - key: FORESIGHT_REFRESH_LOOKBACK_DAYS
        value: "10"
      - key: FORESIGHT_REFRESH_FRESHNESS_DAYS
        value: "10"
      - key: FORESIGHT_FORECAST_HORIZONS
        value: "30,90,180,300"
      - key: FORESIGHT_FORECAST_WINDOW_SIZE
        value: "60"
