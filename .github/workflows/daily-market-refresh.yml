name: Daily Supabase market refresh

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Refresh mode"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full

concurrency:
  group: daily-supabase-market-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-refresh.txt

      - name: Refresh Supabase market data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FORESIGHT_MARKET_DATA_PROVIDER: yfinance
          FORESIGHT_REFRESH_MODE: ${{ github.event.inputs.mode || 'incremental' }}
          FORESIGHT_REFRESH_LOOKBACK_DAYS: "10"
          FORESIGHT_REFRESH_FRESHNESS_DAYS: "10"
          FORESIGHT_FORECAST_HORIZONS: "30,90,180,300"
          FORESIGHT_FORECAST_WINDOW_SIZE: "60"
        run: |
          scripts/refresh_supabase_daily.sh
