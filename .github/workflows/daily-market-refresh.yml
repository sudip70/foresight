name: Daily market refresh

on:
  schedule:
    # GitHub Actions uses UTC. 23:00 UTC is after the US market close year-round.
    - cron: "0 23 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Refresh mode"
        required: true
        default: "incremental"
        type: choice
        options:
          - incremental
          - full

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements.txt

      - name: Refresh Supabase market data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STOCKIFY_MARKET_DATA_PROVIDER: yfinance
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="incremental"; fi
          python offline/supabase_refresh.py --mode "$MODE"
